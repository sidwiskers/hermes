name: Hermes Guardian

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: hermes-guardian
  cancel-in-progress: false

jobs:
  bot-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up current stable Go
        uses: actions/setup-go@v7
        with:
          go-version: stable
          check-latest: true
          cache: true

      - name: Inspect Telegram Bot API
        id: guardian
        shell: bash
        run: |
          ./scripts/guardian.sh
          printf 'status=%s\n' "$(<.guardian/status)" >>"$GITHUB_OUTPUT"
          printf 'version=%s\n' "$(jq -r .version spec/bot-api.json)" >>"$GITHUB_OUTPUT"

      - name: Run complete release gates
        if: steps.guardian.outputs.status == 'ready'
        env:
          RELEASE_ALLOW_DIRTY: '1'
        run: ./scripts/release-check.sh

      - name: Compile review-required update
        if: steps.guardian.outputs.status == 'review'
        run: |
          ./scripts/check-generated.sh
          go test -run '^$' ./...
          go test -tags=integration -run '^$' ./integration/...

      - name: Build pull request description
        if: steps.guardian.outputs.status != 'unchanged'
        shell: bash
        run: |
          {
            cat .guardian/diff.md
            printf '\n## Typed parity audit\n\n```text\n'
            cat .guardian/audit.txt
            printf '```\n\n'
            if [[ "${{ steps.guardian.outputs.status }}" == 'ready' ]]; then
              printf 'Guardian generated a zero-gap update and the complete release gate passed. '
              printf 'This pull request remains a draft for maintainer review and live release evidence.\n'
            else
              printf 'Guardian preserved the official schema and generated safe declarations, but typed parity still has gaps. '
              printf 'A maintainer or provider-neutral repair agent must implement those gaps without weakening the audit.\n'
            fi
            printf '\nGenerated by the deterministic workflow documented in `docs/maintenance.md`.\n'
          } >.guardian/pull-request.md

      - name: Commit update branch
        if: steps.guardian.outputs.status != 'unchanged'
        id: commit
        shell: bash
        env:
          VERSION: ${{ steps.guardian.outputs.version }}
        run: |
          branch='automation/bot-api-update'
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git switch -C "$branch"
          git config user.name 'hermes-guardian[bot]'
          git config user.email 'hermes-guardian[bot]@users.noreply.github.com'
          git add \
            spec/bot-api.json \
            types/zz_botapi_generated.go \
            api/zz_botapi_aliases_generated.go \
            zz_botapi_aliases_generated.go \
            spec/api-surface.txt
          git commit -m "Update Telegram Bot API schema to ${VERSION}"
          git push --force-with-lease origin "HEAD:${branch}"
          printf 'branch=%s\n' "$branch" >>"$GITHUB_OUTPUT"

      - name: Open or refresh draft pull request
        if: steps.guardian.outputs.status != 'unchanged'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.commit.outputs.branch }}
          VERSION: ${{ steps.guardian.outputs.version }}
        run: |
          number="$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')"
          title="Update typed API for Telegram Bot API ${VERSION}"
          if [[ -n "$number" ]]; then
            gh pr edit "$number" --title "$title" --body-file .guardian/pull-request.md
          else
            gh pr create \
              --draft \
              --base main \
              --head "$BRANCH" \
              --title "$title" \
              --body-file .guardian/pull-request.md
          fi

      - name: Report Guardian infrastructure failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title='Hermes Guardian infrastructure failure'
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            printf 'Hermes Guardian could not complete its deterministic maintenance run.\n\n'
            printf '- Run: %s\n' "$run_url"
            printf '- Commit: `%s`\n' "$GITHUB_SHA"
            printf '- Trigger: `%s`\n\n' "$GITHUB_EVENT_NAME"
            printf 'No stable release or protected branch was changed. Inspect the run log and rerun after repair.\n'
          } >.guardian-failure.md
          number="$(gh issue list --state open --search "${title} in:title" --json number,title --jq ".[] | select(.title == \"${title}\") | .number" | head -1)"
          if [[ -n "$number" ]]; then
            gh issue edit "$number" --body-file .guardian-failure.md
          else
            gh issue create --title "$title" --body-file .guardian-failure.md
          fi
